on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 */1 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - run: |
          pip install cloudscraper beautifulsoup4 requests python-dotenv

      - run: |
          python monster-v8-ultra.py
