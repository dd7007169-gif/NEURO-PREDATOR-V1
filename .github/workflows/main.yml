name: Bot Monster Ultra V6

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */2 * * *' # Berjalan otomatis setiap 2 jam

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Chrome Browser
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Install Requirements
        # Kita pakai Playwright karena lebih stabil di lingkungan GitHub Actions
      run: |
        pip install playwright
        playwright install chromium
        pip install requests

    - name: Run Bot
      env:
        EMAIL_FP: ${{ secrets.EMAIL_FP }}
        ADDR_LTC: ${{ secrets.ADDR_LTC }}
      run: python bot_mulung.py
