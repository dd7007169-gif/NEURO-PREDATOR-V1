name: Bot Hewan Joget Dangdut

on:
  schedule:
    - cron: '0 */2 * * *'   # setiap 2 jam
  workflow_dispatch:         # bisa manual

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install moviepy requests beautifulsoup4 yt-dlp librosa soundfile pyppeteer imageio[ffmpeg]

      - name: Run bot
        run: python bot_lengkap.py
