# File konfigurasi YAML untuk bot hewan joget
# (Opsional - kode asli tidak membaca ini, hanya sebagai dokumentasi)

bot:
  nama: "Hewan Joget Dangdut"
  versi: "1.0"
  jumlah_video_per_hari: 5
  max_duration: 15
  timeout_generate: 900
  timeout_upload: 300
  max_retry: 3
  retry_delay: 60

folder:
  video_ai_mentah: "./video_ai_mentah"
  video_siap_upload: "./video_siap_upload"

log:
  file: "bot_log.txt"

facebook:
  # Token dan Page ID diambil dari environment variable
  token_env: "FB_TOKEN"
  page_id_env: "FB_PAGE_ID"
  api_version: "v19.0"
