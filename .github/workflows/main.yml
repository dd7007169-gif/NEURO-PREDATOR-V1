# ================= KONFIGURASI BOT HEWAN JOGET =================

# Pengaturan jumlah dan durasi video
bot:
  jumlah_video_per_hari: 5
  max_duration: 15                  # detik per video
  timeout_generate: 900             # 15 menit
  timeout_upload: 300               # 5 menit
  max_retry: 3
  retry_delay: 60                   # detik antar percobaan

# Folder penyimpanan sementara
folders:
  hasil_ai: "./video_ai_mentah"
  siap_upload: "./video_siap_upload"

# File log
log_file: "bot_log.txt"

# Kredensial Facebook (ambil dari environment variable demi keamanan)
facebook:
  token_env: "FB_TOKEN"             # nama variabel lingkungan
  page_id_env: "FB_PAGE_ID"

# ================================================================
