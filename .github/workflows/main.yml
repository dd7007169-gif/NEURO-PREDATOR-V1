name: MesinUangJohn
on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil Kode
        uses: actions/checkout@v3
      - name: Setel Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Instal Bahan
        run: pip install requests
      - name: Jalankan Bot
        run: python bot_mulung.py
