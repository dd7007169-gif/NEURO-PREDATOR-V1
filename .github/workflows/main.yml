name: Neuro-Predator-V5-Auto

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup System
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run Engine
        env:
          FB_COOKIES_JSON: ${{ secrets.FB_COOKIES_JSON }}
        run: python bot.py

      - name: Save Memory
        run: |
          git config --global user.name "V5-Bot"
          git config --global user.email "bot@github.com"
          git add history.txt
          git commit -m "Update history [skip ci]" || exit 0
          git push
          
