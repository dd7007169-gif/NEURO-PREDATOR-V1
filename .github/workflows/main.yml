name: ULTRA-PREDATOR-V7

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kode
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install FFmpeg & Browser
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps

      - name: Eksekusi Misi Utama
        env:
          # GANTI NAMA SECRETS DI GITHUB MENJADI: KUNCI_PREDATOR
          KUNCI_PREDATOR: ${{ secrets.KUNCI_PREDATOR }}
        run: python bot.py
