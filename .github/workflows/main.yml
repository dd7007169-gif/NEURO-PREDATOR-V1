name: PREDATOR-REVOLUTION-PRO-V6

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kode
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Alat & Browser
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps

      - name: Eksekusi Misi
        env:
          COOKIE_HEX: ${{ secrets.COOKIE_HEX }}
        run: python bot.py
